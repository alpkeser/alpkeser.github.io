---
layout: default
title: Blog — Alp Keser
---
<div class="page-header">
  <h1>Blog</h1>
</div>
<ul class="post-list">
  {% for post in site.posts %}
    <li>
      <a href="{{ post.url }}" title="{{ post.title }}">{{ post.title }}</a>
      <span class="post-date">{{ post.date | date_to_string }}</span>
    </li>
  {% endfor %}
</ul>
